<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
  </defs>
  <g font-family="sans-serif" font-size="14" text-anchor="middle">
    <!-- Nodes -->
    <rect x="10" y="60" width="160" height="80" rx="10" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2"/>
    <text x="90" y="105" font-weight="bold" fill="#4a148c">Pre-Training</text>

    <rect x="220" y="60" width="160" height="80" rx="10" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2"/>
    <text x="300" y="95" font-weight="bold" fill="#4a148c">Supervised</text>
    <text x="300" y="115" font-weight="bold" fill="#4a148c">Fine-Tuning</text>

    <rect x="430" y="60" width="160" height="80" rx="10" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2"/>
    <text x="510" y="105" font-weight="bold" fill="#4a148c">RLHF</text>

    <rect x="640" y="60" width="140" height="80" rx="10" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2"/>
    <text x="710" y="95" font-weight="bold" fill="#4a148c">Chat</text>
    <text x="710" y="115" font-weight="bold" fill="#4a148c">Optimisation</text>

    <!-- Edges -->
    <line x1="170" y1="100" x2="210" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="380" y1="100" x2="420" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="590" y1="100" x2="630" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- Edge Labels -->
    <text x="190" y="90" font-size="10" fill="#555">Foundation</text>
    <text x="190" y="115" font-size="10" fill="#555">Model</text>
    
    <text x="400" y="90" font-size="10" fill="#555">Instruct</text>
    <text x="400" y="115" font-size="10" fill="#555">Model</text>

    <text x="610" y="90" font-size="10" fill="#555">Aligned</text>
    <text x="610" y="115" font-size="10" fill="#555">Model</text>
  </g>
</svg>
